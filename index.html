<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopName</title>

    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/colors.css">
    <link rel="stylesheet" href="CSS/theme-dark.css">

    <link rel="icon" type="image/png" href="uploads/Logos/logo_Simple.png">
</head>

<body class="dark">

<!-- ================= HEADER ================= -->
<header>

        <!-- 🧿 MANDALA ICON (HEADER OVERLAY - FIXED POSITION) -->

        </a>

        <div class="banner">
            <img src="uploads/Banners/Banner.png" alt="Banner">
        </div>

        <div class="headtext-overlay">
            <div class="headtext">

            <img src="uploads/Logos/logo.png" alt="Logo">

    </div>

<!-- ================= NAVBAR (DIRECTLY UNDER HEADER) ================= -->
<nav class="NavBar">

        <!-- 🔘 THEME TOGGLE ONLY (NO HOME BUTTON) -->
        <a href="indexlight.html" class="theme-icon-btn">
            <img src="uploads/Icons/Sun.png" alt="Light Mode">
        </a>

    </div>
</nav>

<!-- ================= CONTENT ================= -->
<section>
    <h2>Products</h2>
</section>

<footer>
