<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopName</title>

    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/light.css">

    <link rel="icon" type="image/png" href="uploads/Logos/logo_Simple.png">
</head>

<body class="light">

<header>
    <div class="header">

        <!-- 🧿 MANDELA ICON (HEADER ONLY) -->
        <a href="index.html" class="theme-icon-header" title="Switch to Dark Mode">
            <img src="uploads/Icons/Moon.png" alt="Dark Mode">
        </a>

        <div class="banner">
            <img src="uploads/Banners/Banner.png" alt="Banner">
        </div>

        <div class="headtext-overlay">
            <div class="headtext">
                <h1>ShopName</h1>
                <p>Bonus text</p>
            </div>
        </div>

        <div class="logo">
            <img src="uploads/Logos/logo.png" alt="Logo">
        </div>

    </div>
</header>

<nav class="NavBar">
    <div class="nav-container">

        <!-- 🔘 THEME TOGGLE (NAV ONLY) -->
        <a href="index.html" class="theme-icon-btn" title="Switch to Dark Mode">
            <img src="uploads/Icons/Moon.png" alt="Dark Mode">
        </a>

    </div>
</nav>

<section>
    <h2>Products</h2>
</section>

<footer>
    <div class="footer">
        <p>Contact</p>
        <p>Email: Blabla@blabla.nl</p>
    </div>
</footer>

</body>
</html>
